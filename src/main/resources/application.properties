# Porto do Servidor
server.port=${PORT:8080}
spring.application.name=backend

# Configuração do Banco de Dados H2 em Memória
spring.datasource.url=jdbc:h2:mem:ilsegretodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Ativando o Painel de Controle do Banco de Dados (H2 Console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Configuração do JPA / Hibernate para criar as tabelas automaticamente
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Espaço reservado para as chaves de Login Social (OAuth2)
